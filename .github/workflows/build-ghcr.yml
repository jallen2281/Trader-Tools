name: Build and Push to GHCR

on:
  push:
    branches: [ main, master, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata (tags, labels)
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |
          GIT_COMMIT=${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Image digest
      run: echo ${{ steps.build.outputs.digest }}

    # Auto-deploy: bump the commitSha in the Helm values so the rendered manifest
    # changes and ArgoCD rolls the pods (which re-pull :latest). [skip ci] on the
    # bump commit prevents an infinite build loop.
    - name: Bump deployed commit in Helm values (triggers ArgoCD rollout)
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      run: |
        SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-10)
        sed -i "s/^commitSha:.*/commitSha: \"${SHORT_SHA}\"/" helm/trader-tools/values.yaml
        if git diff --quiet -- helm/trader-tools/values.yaml; then
          echo "commitSha already up to date; nothing to push"
          exit 0
        fi
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add helm/trader-tools/values.yaml
        git commit -m "chore: deploy ${SHORT_SHA} [skip ci]"
        git push origin HEAD:${GITHUB_REF_NAME}
