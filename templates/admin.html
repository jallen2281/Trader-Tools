<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Financial Analyzer</title>
    <link rel="icon" type="image/svg+xml" href="/static/robot-icon.svg">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .stat-card .stat-value {
            font-size: 2em;
            font-weight: 700;
            color: var(--accent);
        }
        .stat-card .stat-label {
            color: var(--text-secondary);
            margin-top: 4px;
            font-size: 0.9em;
        }
        .users-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .users-table th, .users-table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .users-table th {
            background: var(--bg-tertiary);
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.85em;
            text-transform: uppercase;
        }
        .users-table tr:hover {
            background: var(--bg-tertiary);
        }
        .role-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: 600;
        }
        .role-admin { background: rgba(239,68,68,0.15); color: #ef4444; }
        .role-moderator { background: rgba(168,85,247,0.15); color: #a855f7; }
        .role-user { background: rgba(59,130,246,0.15); color: #3b82f6; }
        .status-active { color: #10b981; }
        .status-disabled { color: #ef4444; }
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            vertical-align: middle;
            margin-right: 8px;
        }
        .action-select {
            padding: 6px 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 0.85em;
        }
        .toggle-btn {
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
            background: var(--bg-primary);
            color: var(--text-primary);
        }
        .toggle-btn:hover { background: var(--bg-tertiary); }
    </style>
</head>
<body>
    <div class="app-container">
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">☰</button>
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>� Watchlist</h2>
                <button id="refreshWatchlist" class="icon-btn" title="Refresh Prices">🔄</button>
            </div>
            <div class="watchlist-add">
                <input type="text" id="watchlistSymbolInput" placeholder="Add symbol..." />
                <button id="addToWatchlist">+</button>
            </div>
            <div id="watchlistItems" class="watchlist-items"></div>

            <div class="sidebar-section">
                <h3>🔔 Active Alerts (<span id="alertCount">0</span>)</h3>
                <div id="sidebarAlertsList" class="sidebar-alerts-list"></div>
                <button id="manageAlerts" class="btn-secondary">Manage Alerts</button>
            </div>

            <div class="sidebar-section">
                <h3>📈 Navigation</h3>
                <a href="/dashboard" class="btn-secondary" style="width:100%;margin-bottom:8px;display:block;text-align:center;">Dashboard</a>
                <a href="/portfolio" class="btn-secondary" style="width:100%;margin-bottom:8px;display:block;text-align:center;">💼 Portfolio</a>
                <a href="/community" class="btn-secondary" style="width:100%;margin-bottom:8px;display:block;text-align:center;">💬 Community</a>
                <a href="/copytrading" class="btn-secondary" style="width:100%;display:block;text-align:center;">🎯 Copy Trading</a>
            </div>
        </aside>
        <main class="main-content">
            <div class="admin-container">
                <div class="navbar">
                    <div class="nav-brand">🛡️ Admin Dashboard</div>
                    <div class="nav-actions">
                        <button onclick="location.href='/dashboard'" class="btn-secondary">← Dashboard</button>
                    </div>
                </div>

                <div id="statsGrid" class="stats-grid">
                    <div class="stat-card"><div class="stat-value" id="statUsers">-</div><div class="stat-label">Total Users</div></div>
                    <div class="stat-card"><div class="stat-value" id="statActive">-</div><div class="stat-label">Active Users</div></div>
                    <div class="stat-card"><div class="stat-value" id="statThreads">-</div><div class="stat-label">Threads</div></div>
                    <div class="stat-card"><div class="stat-value" id="statHoldings">-</div><div class="stat-label">Total Holdings</div></div>
                </div>

                <h2 style="margin-bottom:16px;color:var(--text-primary);">User Management</h2>
                <div style="overflow-x:auto;">
                    <table class="users-table">
                        <thead>
                            <tr>
                                <th>User</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th>Copy Trading</th>
                                <th>Joined</th>
                                <th>Last Login</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody">
                            <tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text-secondary);">Loading users...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='watchlist.js') }}"></script>
    <script src="{{ url_for('static', filename='admin.js') }}"></script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
    <script>
        const sidebarToggle = document.getElementById('sidebarToggle');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        if (sidebarToggle && sidebar) {
            sidebarToggle.addEventListener('click', () => { sidebar.classList.toggle('open'); sidebarOverlay.classList.toggle('active'); });
            sidebarOverlay.addEventListener('click', () => { sidebar.classList.remove('open'); sidebarOverlay.classList.remove('active'); });
        }
    </script>
</body>
</html>
