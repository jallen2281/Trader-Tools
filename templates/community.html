<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community - Financial Analyzer</title>
    <link rel="icon" type="image/svg+xml" href="/static/robot-icon.svg">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        .community-container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .thread-list { margin-top: 16px; }
        .thread-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .thread-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
        .thread-card.pinned { border-left: 4px solid var(--accent); }
        .thread-title { font-size: 1.15em; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
        .thread-meta { font-size: 0.85em; color: var(--text-secondary); display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
        .thread-meta .author-avatar { width: 20px; height: 20px; border-radius: 50%; vertical-align: middle; margin-right: 4px; }
        .category-badge { padding: 2px 8px; border-radius: 8px; font-size: 0.8em; font-weight: 600; background: rgba(59,130,246,0.15); color: #3b82f6; }
        .category-analysis { background: rgba(168,85,247,0.15); color: #a855f7; }
        .category-news { background: rgba(234,179,8,0.15); color: #eab308; }
        .category-options { background: rgba(16,185,129,0.15); color: #10b981; }
        .category-crypto { background: rgba(249,115,22,0.15); color: #f97316; }
        .symbol-tag { padding: 2px 8px; border-radius: 8px; font-size: 0.8em; font-weight: 700; background: rgba(16,185,129,0.15); color: #10b981; }
        .vote-box { display: flex; flex-direction: column; align-items: center; min-width: 40px; margin-right: 12px; }
        .vote-btn { background: none; border: none; cursor: pointer; font-size: 1.1em; padding: 2px; opacity: 0.5; }
        .vote-btn:hover, .vote-btn.voted { opacity: 1; }
        .vote-count { font-weight: 700; font-size: 0.95em; color: var(--text-primary); }

        /* Thread detail view */
        .thread-detail { display: none; }
        .thread-body { color: var(--text-primary); line-height: 1.7; white-space: pre-wrap; word-wrap: break-word; margin: 16px 0; }
        .replies-section { margin-top: 24px; }
        .reply-card {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 10px;
        }
        .reply-body { color: var(--text-primary); line-height: 1.6; white-space: pre-wrap; word-wrap: break-word; }
        .reply-meta { font-size: 0.8em; color: var(--text-secondary); margin-top: 8px; display: flex; gap: 12px; align-items: center; }

        /* Forms */
        .create-form { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; display: none; }
        .form-input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-primary); color: var(--text-primary); font-size: 0.95em; margin-bottom: 10px; box-sizing: border-box; }
        .form-textarea { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-primary); color: var(--text-primary); font-size: 0.95em; min-height: 100px; resize: vertical; font-family: inherit; margin-bottom: 10px; box-sizing: border-box; }
        .form-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .form-row .form-input, .form-row select { flex: 1; }

        /* Category tabs */
        .category-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
        .cat-tab { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text-secondary); cursor: pointer; font-size: 0.9em; }
        .cat-tab.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* Online users */
        .online-bar { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 10px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-size: 0.85em; }
        .online-dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; display: inline-block; }
        .online-avatar { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #10b981; }

        .locked-badge { color: #ef4444; font-size: 0.8em; font-weight: 600; }
    </style>
</head>
<body>
    <div class="app-container">
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">☰</button>
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>💬 Community</h2>
            </div>
            <div class="sidebar-section">
                <h3>🟢 Online Now</h3>
                <div id="sidebarOnline" style="font-size:0.85em;color:var(--text-secondary);">Loading...</div>
            </div>
            <div class="sidebar-section">
                <h3>📈 Quick Links</h3>
                <a href="/dashboard" class="btn-secondary" style="width:100%;margin-bottom:8px;display:block;text-align:center;">Dashboard</a>
                <a href="/portfolio" class="btn-secondary" style="width:100%;margin-bottom:8px;display:block;text-align:center;">💼 Portfolio</a>
                <a href="/copytrading" class="btn-secondary" style="width:100%;display:block;text-align:center;">🎯 Copy Trading</a>
            </div>
        </aside>
        <main class="main-content">
            <div class="community-container">
                <div class="navbar">
                    <div class="nav-brand">💬 Community Discussions</div>
                    <div class="nav-actions">
                        <button onclick="location.href='/dashboard'" class="btn-secondary">← Dashboard</button>
                    </div>
                </div>

                <!-- Thread List View -->
                <div id="threadListView">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;">
                        <div class="category-tabs">
                            <button class="cat-tab active" onclick="filterCategory('all')">All</button>
                            <button class="cat-tab" onclick="filterCategory('general')">💬 General</button>
                            <button class="cat-tab" onclick="filterCategory('analysis')">📊 Analysis</button>
                            <button class="cat-tab" onclick="filterCategory('news')">📰 News</button>
                            <button class="cat-tab" onclick="filterCategory('options')">📈 Options</button>
                            <button class="cat-tab" onclick="filterCategory('crypto')">🪙 Crypto</button>
                        </div>
                        <button class="btn btn-primary" onclick="toggleCreateForm()">+ New Thread</button>
                    </div>

                    <!-- Create Thread Form -->
                    <div id="createForm" class="create-form">
                        <h3 style="margin-bottom:12px;color:var(--text-primary);">Create New Thread</h3>
                        <input type="text" id="newTitle" class="form-input" placeholder="Thread title..." maxlength="200">
                        <div class="form-row">
                            <select id="newCategory" class="form-input">
                                <option value="general">💬 General</option>
                                <option value="analysis">📊 Analysis</option>
                                <option value="news">📰 News</option>
                                <option value="options">📈 Options</option>
                                <option value="crypto">🪙 Crypto</option>
                            </select>
                            <input type="text" id="newSymbol" class="form-input" placeholder="Symbol (optional, e.g. AAPL)" maxlength="10">
                        </div>
                        <textarea id="newBody" class="form-textarea" placeholder="What's on your mind?"></textarea>
                        <div style="display:flex;gap:10px;">
                            <button class="btn btn-primary" onclick="submitThread()">Post Thread</button>
                            <button class="btn btn-secondary" onclick="toggleCreateForm()">Cancel</button>
                        </div>
                    </div>

                    <div id="threadList" class="thread-list">
                        <div style="text-align:center;padding:40px;color:var(--text-secondary);">Loading threads...</div>
                    </div>

                    <div id="pagination" style="display:flex;justify-content:center;gap:10px;margin-top:20px;"></div>
                </div>

                <!-- Thread Detail View -->
                <div id="threadDetailView" class="thread-detail">
                    <button class="btn btn-secondary" onclick="backToList()" style="margin-bottom:16px;">← Back to threads</button>
                    <div id="threadContent"></div>
                    <div class="replies-section">
                        <h3 id="replyCount" style="color:var(--text-primary);margin-bottom:12px;">Replies</h3>
                        <div id="repliesList"></div>
                        <div id="replyForm" style="margin-top:16px;">
                            <textarea id="replyBody" class="form-textarea" placeholder="Write a reply..."></textarea>
                            <button class="btn btn-primary" onclick="submitReply()">Post Reply</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='community.js') }}"></script>
    <script>
        const sidebarToggle = document.getElementById('sidebarToggle');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        if (sidebarToggle && sidebar) {
            sidebarToggle.addEventListener('click', () => { sidebar.classList.toggle('open'); sidebarOverlay.classList.toggle('active'); });
            sidebarOverlay.addEventListener('click', () => { sidebar.classList.remove('open'); sidebarOverlay.classList.remove('active'); });
        }
        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark-mode');
        });
    </script>
</body>
</html>
