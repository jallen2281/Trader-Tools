# Default values for trader-tools Helm chart
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 2

image:
  repository: ghcr.io/jallen2281/trader-tools  # Update with your registry
  pullPolicy: Always
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "5000"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 5000
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/affinity: "cookie"
  hosts:
    - host: tradertools.kegbot.net
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: trader-tools-tls
      hosts:
        - tradertools.kegbot.net

resources:
  limits:
    cpu: 2000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

persistence:
  enabled: true
  storageClass: "standard"
  accessMode: ReadWriteOnce
  size: 10Gi

# Application configuration
config:
  flaskEnv: production
  logLevel: INFO
  
  # LLM Provider: ollama or rkllm
  llmProvider: rkllm
  
  # Ollama Configuration
  ollamaBaseUrl: http://localhost:11434
  ollamaModel: llama3.2
  ollamaTimeout: "120"
  useVision: "False"
  fallbackModel: llama3.2
  
  # RKLLM Configuration (Turing Pi)
  rkllmBaseUrl: http://node1:8000
  rkllmEndpoint: /rkllm_chat
  rkllmTimeout: "120"
  
  # Chart Configuration
  chartDpi: "100"
  chartStyle: "seaborn-v0_8-darkgrid"
  chartWidth: "12"
  chartHeight: "6"
  
  # Default Stock Settings  
  defaultSymbol: SPX
  defaultPeriod: 6mo
  defaultInterval: 1d
  
  # Monitoring (increased to reduce Yahoo Finance API load)
  monitoringInterval: 900  # 15 minutes (increased from 5 min)
  alertCheckInterval: 900  # 15 minutes (increased from 5 min)
  
  # Feature Flags
  enablePatternRecognition: true
  enableMLDetection: true
  enableSentimentAnalysis: true
  
  # Rate Limiting
  rateLimitEnabled: true
  rateLimitDefault: "100 per hour"

# Secrets (should be set via --set-string or separate values file)
secrets:
  secretKey: ""  # REQUIRED
  databaseUrl: "sqlite:////data/financial_analysis.db"
  googleClientId: ""  # REQUIRED
  googleClientSecret: ""  # REQUIRED
  alphaVantageApiKey: ""
  newsApiKey: ""
  quandlApiKey: ""
  # ollamaBaseUrl moved to config (not sensitive)

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - trader-tools
          topologyKey: kubernetes.io/hostname
